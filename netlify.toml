[build]
  publish = "public"
  command = "./build.sh"
  functions = "netlify/functions"

# Disable automatic plugin installation and Gatsby detection
[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--production=false"
  GATSBY_TELEMETRY_DISABLED = "1"
  CI = "true"
  NETLIFY_USE_YARN = "false"
  NETLIFY_SKIP_GATSBY_CACHE = "true"
  NETLIFY_EXPERIMENTAL_USE_NODE_MODULES_CACHE = "false"
  NETLIFY_GATSBY_PLUGIN_DISABLE = "true"
  NETLIFY_SKIP_AUTO_PLUGINS = "true"
  NETLIFY_SKIP_FRAMEWORK_DETECTION = "true"
  
[build.cache]
  paths = [
    "node_modules"
  ]

# Prevent caching issues with Gatsby
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true
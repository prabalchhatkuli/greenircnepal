[build]
  publish = "public"
  command = "npm run build:netlify"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--production=false"
  GATSBY_TELEMETRY_DISABLED = "1"
  CI = "true"
  
[build.cache]
  paths = [
    "node_modules"
  ]

# Prevent caching issues with Gatsby
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true